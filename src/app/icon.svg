<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      .logo-text-black {
        fill: #000000;
      }
      .logo-text-gray {
        fill: #555555;
      }
      @media (prefers-color-scheme: dark) {
        .logo-text-black {
          fill: #ffffff !important;
        }
        .logo-text-gray {
          fill: #cccccc !important;
        }
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="none" />
  
  <g fill="none" stroke="#C5A059" stroke-width="2">
    <rect x="100" y="100" width="300" height="300" />
    <rect x="100" y="100" width="300" height="300" transform="rotate(45 250 250)" />
    <rect x="110" y="110" width="280" height="280" transform="rotate(45 250 250)" />
  </g>

  <g fill="none" stroke="#C5A059" stroke-width="1.5">
    <path d="M250 140 L210 180 L250 220 L290 180 Z" />
    <path d="M250 140 L190 185 L250 220 L310 185 Z" />
    <path d="M250 140 L170 195 L250 220 L330 195 Z" />
  </g>

  <g text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">
    <text class="logo-text-black" x="250" y="270" fill="#000000" font-size="34" letter-spacing="2">SAN PEDRO</text>
    <text x="250" y="340" fill="#C5A059" font-size="90" letter-spacing="1">PLUS</text>
    
    <line x1="160" y1="365" x2="210" y2="365" stroke="#C5A059" stroke-width="2" />
    <text class="logo-text-gray" x="250" y="372" fill="#555555" font-size="20" font-weight="normal" letter-spacing="5">EVENTOS</text>
    <line x1="290" y1="365" x2="340" y2="365" stroke="#C5A059" stroke-width="2" />
  </g>
</svg>
